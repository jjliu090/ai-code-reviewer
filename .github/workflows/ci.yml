name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'  # 添加缓存

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build and test
        run: ./gradlew build  # build 已经包含 test,不用单独运行
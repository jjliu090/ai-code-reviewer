name: CI

# 什么时候运行
on:
  push:
    branches: [ main ]  # 推送到 main 分支时
  pull_request:
    branches: [ main ]  # 创建 PR 时

jobs:
  build:
    runs-on: ubuntu-latest  # 在 Ubuntu 虚拟机运行
    
    steps:
    # 1. 下载代码
    - name: Checkout code
      uses: actions/checkout@v3
    
    # 2. 设置 Java 环境
    - name: Set up Java
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
    
    # 3. 编译项目
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    
    - name: Build with Gradle
      run: ./gradlew build
    
    
    # 4. 运行测试
    - name: Run tests
      run: ./gradlew test

